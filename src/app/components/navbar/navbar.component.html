<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#1a1a2e"/>
        <path d="M7 10h14M7 14h9M7 18h11" stroke="#e8c547" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>ShopLux</span>
    </a>

    <div class="navbar__search">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        placeholder="Search products..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        (keydown)="onSearchKeydown($event, searchQuery())"
        class="navbar__search-input"
      />
    </div>

    <div class="navbar__actions">
      <a routerLink="/products" routerLinkActive="active" class="navbar__link">Products</a>

      @if (authService.isLoggedIn()) {
        <a routerLink="/orders" routerLinkActive="active" class="navbar__link">Orders</a>
        <div class="navbar__user">
          <div class="user-avatar">
            {{ authService.currentUser()?.name?.charAt(0) ?? 'U' }}
          </div>
          <button class="navbar__btn-text" (click)="authService.logout()">Logout</button>
        </div>
      } @else {
        <button class="navbar__btn-outline" (click)="authService.openModal('signin')">Sign In</button>
        <button class="navbar__btn-primary" (click)="authService.openModal('signup')">Sign Up</button>
      }

      <button class="navbar__cart-btn" (click)="cartService.openCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        @if (cartService.totalItems() > 0) {
          <span class="cart-badge">{{ cartService.totalItems() }}</span>
        }
      </button>
    </div>

    <button class="navbar__mobile-toggle" (click)="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  @if (mobileMenuOpen()) {
    <div class="navbar__mobile-menu">
      <div class="navbar__search navbar__search--mobile">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          placeholder="Search products..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          (keydown)="onSearchKeydown($event, searchQuery())"
          class="navbar__search-input"
        />
      </div>
      <a routerLink="/products" class="mobile-link" (click)="mobileMenuOpen.set(false)">Products</a>
      @if (authService.isLoggedIn()) {
        <a routerLink="/orders" class="mobile-link" (click)="mobileMenuOpen.set(false)">Orders</a>
      }
      @if (!authService.isLoggedIn()) {
        <button class="navbar__btn-outline" (click)="authService.openModal('signin'); mobileMenuOpen.set(false)">Sign In</button>
        <button class="navbar__btn-primary" (click)="authService.openModal('signup'); mobileMenuOpen.set(false)">Sign Up</button>
      }
    </div>
  }
</nav>
