@if (authService.isModalOpen()) {
  <div class="modal-overlay" (click)="authService.closeModal()"></div>

  <div class="modal">
    <button class="modal__close" (click)="authService.closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>

    <div class="modal__brand">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#1a1a2e"/>
        <path d="M7 10h14M7 14h9M7 18h11" stroke="#e8c547" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>ShopLux</span>
    </div>

    <!-- Tabs -->
    <div class="modal__tabs">
      <button
        class="tab"
        [class.tab--active]="authService.modalMode() === 'signin'"
        (click)="authService.modalMode.set('signin')"
      >Sign In</button>
      <button
        class="tab"
        [class.tab--active]="authService.modalMode() === 'signup'"
        (click)="authService.modalMode.set('signup')"
      >Sign Up</button>
    </div>

    @if (authService.modalMode() === 'signin') {
      <div class="modal__form">
        <h2>Welcome back</h2>
        <p class="modal__subtitle">Sign in to your ShopLux account</p>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" class="form-input" [(ngModel)]="email" />
        </div>

        <div class="form-group">
          <label>
            Password
            <a href="#" class="form-link">Forgot password?</a>
          </label>
          <div class="input-password">
            <input [type]="showPassword() ? 'text' : 'password'" placeholder="Your password" class="form-input" [(ngModel)]="password" (keydown.enter)="onSubmit()" />
            <button class="toggle-pw" type="button" (click)="togglePassword()">
              @if (showPassword()) {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button class="btn-submit" (click)="onSubmit()" [disabled]="isLoading()">
          {{ isLoading() ? 'Signing In...' : 'Sign In' }}
        </button>

        <p class="modal__switch">
          Don't have an account?
          <button class="link-btn" (click)="authService.modalMode.set('signup')">Sign Up</button>
        </p>
      </div>
    } @else {
      <div class="modal__form">
        <h2>Create account</h2>
        <p class="modal__subtitle">Join ShopLux today</p>

        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <input type="text" placeholder="John" class="form-input" [(ngModel)]="firstName" />
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" placeholder="Doe" class="form-input" [(ngModel)]="lastName" />
          </div>
        </div>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" class="form-input" [(ngModel)]="email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-password">
            <input [type]="showPassword() ? 'text' : 'password'" placeholder="Create a strong password" class="form-input" [(ngModel)]="password" (keydown.enter)="onSubmit()" />
            <button class="toggle-pw" type="button" (click)="togglePassword()">
              @if (showPassword()) {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="terms" />
          <label for="terms">I agree to the <a href="#" class="form-link">Terms of Service</a> and <a href="#" class="form-link">Privacy Policy</a></label>
        </div>

        <button class="btn-submit" (click)="onSubmit()" [disabled]="isLoading()">
          {{ isLoading() ? 'Creating Account...' : 'Create Account' }}
        </button>

        <p class="modal__switch">
          Already have an account?
          <button class="link-btn" (click)="authService.modalMode.set('signin')">Sign In</button>
        </p>
      </div>
    }
  </div>
}
